<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptCraft - AI Image Prompt Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            /* The cream background from your screenshot */
            background-color: #f3ead3; 
        }
        
        /* The signature Neo-Brutalist Hard Shadow */
        .brutal-shadow {
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            transition: all 0.1s ease;
        }
        
        /* Button press animation - crushes the shadow */
        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }
    </style>
</head>
<body class="min-h-screen text-black">

    <nav class="border-b-4 border-black bg-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black uppercase tracking-tight">PromptCraft</h1>
            <span class="text-sm font-bold bg-[#ff9c3a] border-2 border-black py-1 px-3 rounded-full brutal-shadow">v0.1</span>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <section class="md:col-span-2 bg-white border-4 border-black rounded-2xl brutal-shadow p-8">
            <h2 class="text-3xl font-black uppercase mb-6 border-b-4 border-black pb-2">Config</h2>
            
            <div class="mb-6">
                <label class="block text-lg font-bold mb-2">Subject & Action</label>
                <textarea id="core-subject" rows="3" class="w-full border-4 border-black rounded-xl p-3 focus:outline-none focus:ring-0 text-lg resize-none brutal-shadow" placeholder="e.g., A stylish man in an 'Old Money' outfit walking down a cobblestone street..."></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div>
                    <label class="block text-lg font-bold mb-2">Camera/Lens</label>
                    <select id="camera-setting" class="w-full border-4 border-black rounded-xl p-3 focus:outline-none font-bold brutal-shadow bg-white appearance-none cursor-pointer">
                        <option value="">Default</option>
                        <option value="shot on Sony A1, 85mm lens, f/1.4">Sony A1, 85mm f/1.4</option>
                        <option value="shot on 35mm film, grainy, vintage look">35mm Film (Vintage)</option>
                        <option value="shot on Canon EOS R5, 24mm lens">Canon 24mm (Wide)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-lg font-bold mb-2">Identity Rules</label>
                    <select id="identity-setting" class="w-full border-4 border-black rounded-xl p-3 focus:outline-none font-bold brutal-shadow bg-white appearance-none cursor-pointer">
                        <option value="">Standard</option>
                        <option value="strictly preserving subject identity, accurate facial geometry, no uncanny valley">Strict Geometry</option>
                    </select>
                </div>
            </div>
            
            <button id="generate-btn" class="mt-8 w-full bg-[#ff9c3a] border-4 border-black text-black font-black text-xl py-4 px-4 rounded-xl brutal-shadow brutal-btn uppercase tracking-wide">
                Compile Prompt
            </button>
        </section>

        <section class="bg-white border-4 border-black rounded-2xl brutal-shadow p-8 h-fit">
             <h2 class="text-2xl font-black uppercase mb-4 border-b-4 border-black pb-2">Output</h2>
             
             <div id="output-area" class="bg-[#f3ead3] border-4 border-black p-4 rounded-xl min-h-[150px] font-bold text-lg break-words brutal-shadow mb-6">
                 Your generated prompt will appear here...
             </div>
             
             <div class="flex justify-end">
                 <button id="copy-btn" class="bg-white border-4 border-black text-black font-bold py-2 px-6 rounded-xl brutal-shadow brutal-btn uppercase">
                     Copy
                 </button>
             </div>
        </section>

    </main>

    <script>
        const subjectInput = document.getElementById('core-subject');
        const cameraSelect = document.getElementById('camera-setting');
        const identitySelect = document.getElementById('identity-setting');
        const generateBtn = document.getElementById('generate-btn');
        const outputArea = document.getElementById('output-area');
        const copyBtn = document.getElementById('copy-btn');

        function compilePrompt() {
            const subject = subjectInput.value.trim();
            const camera = cameraSelect.value;
            const identity = identitySelect.value;

            if (!subject) {
                outputArea.textContent = "Please enter a subject or core concept first!";
                outputArea.classList.add("text-red-600");
                return;
            }
            
            outputArea.classList.remove("text-red-600");

            const promptParts = [
                subject, camera, identity,
                "masterpiece", "highly detailed", "cinematic lighting", "8k resolution"
            ];

            const cleanPromptParts = promptParts.filter(part => part !== "");
            outputArea.textContent = cleanPromptParts.join(", ");
        }

        function copyToClipboard() {
            const textToCopy = outputArea.textContent;
            const defaultText = "Your generated prompt will appear here...";
            const errorText = "Please enter a subject or core concept first!";

            if (textToCopy && textToCopy !== defaultText && textToCopy !== errorText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = "COPIED!";
                    copyBtn.classList.replace("bg-white", "bg-[#a3e635]"); // Turns lime green on copy
                    
                    setTimeout(() => {
                        copyBtn.textContent = "COPY";
                        copyBtn.classList.replace("bg-[#a3e635]", "bg-white");
                    }, 2000);
                }).catch(err => console.error('Failed to copy text: ', err));
            }
        }

        generateBtn.addEventListener('click', compilePrompt);
        copyBtn.addEventListener('click', copyToClipboard);
    </script>
</body>
</html>
